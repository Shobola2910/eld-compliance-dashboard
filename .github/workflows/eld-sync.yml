name: ELD sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/sync
        run: |
          curl -sS -f -X GET "${APP_URL}/api/cron/sync" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

# Generated for `fly deploy`. Rename `app` if this name is already taken
# (Fly app names are globally unique), and change `primary_region` if you
# want a region closer to you (see `fly platform regions`).
app = "eld-compliance-dashboard"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
